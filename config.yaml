# Market News Timeline Configuration

rss_feeds:
  # US Financial News
  cnbc:
    url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
    region: "US"
    name: "CNBC Top News"

  yahoo:
    url: "https://finance.yahoo.com/news/rssindex"
    region: "US"
    name: "Yahoo Finance"

  marketwatch:
    url: "https://feeds.marketwatch.com/marketwatch/topstories/"
    region: "US"
    name: "MarketWatch"

  # Europe
  bbc_business:
    url: "https://feeds.bbci.co.uk/news/business/rss.xml"
    region: "UK"
    name: "BBC Business"

  guardian_business:
    url: "https://www.theguardian.com/uk/business/rss"
    region: "UK"
    name: "The Guardian Business"

  dw_business:
    url: "https://rss.dw.com/rdf/rss-en-bus"
    region: "Germany"
    name: "DW Business"

  dw_europe:
    url: "https://rss.dw.com/rdf/rss-en-eu"
    region: "EU"
    name: "DW Europe"

  dw_world:
    url: "https://rss.dw.com/rdf/rss-en-world"
    region: "Global"
    name: "DW World"

  euronews:
    url: "https://www.euronews.com/rss?level=theme&name=business"
    region: "EU"
    name: "Euronews Business"

  france24:
    url: "https://www.france24.com/en/business/rss"
    region: "France"
    name: "France 24 Business"

  ecb:
    url: "https://www.ecb.europa.eu/rss/press.html"
    region: "EU"
    name: "ECB Press"

  # Middle East
  aljazeera:
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    region: "Middle East"
    name: "Al Jazeera"

  # China / Asia
  scmp:
    url: "https://www.scmp.com/rss/5/feed"
    region: "China"
    name: "South China Morning Post"

# News classification keywords
categories:
  geopolitical:
    keywords:
      - "iran"
      - "hormuz"
      - "war"
      - "military"
      - "conflict"
      - "sanctions"
      - "missile"
      - "strike"
      - "troops"
      - "ceasefire"
      - "diplomacy"
      - "nato"
      - "middle east"
    color: "#e74c3c"
    marker: "v"

  monetary:
    keywords:
      - "fed"
      - "interest rate"
      - "rate hike"
      - "rate cut"
      - "inflation"
      - "fomc"
      - "monetary policy"
      - "central bank"
      - "pboc"
      - "ecb"
      - "treasury"
      - "bond yield"
    color: "#3498db"
    marker: "^"

  trade:
    keywords:
      - "tariff"
      - "trade war"
      - "export"
      - "import"
      - "trade deal"
      - "wto"
      - "supply chain"
      - "customs"
      - "liberation day"
    color: "#f39c12"
    marker: "s"

  energy:
    keywords:
      - "oil"
      - "brent"
      - "crude"
      - "opec"
      - "natural gas"
      - "lng"
      - "energy"
      - "petroleum"
      - "refinery"
    color: "#2ecc71"
    marker: "D"

  tech:
    keywords:
      - "ai"
      - "artificial intelligence"
      - "semiconductor"
      - "chip"
      - "tech stock"
      - "nvidia"
      - "apple"
      - "microsoft"
      - "ipo"
      - "spacex"
    color: "#9b59b6"
    marker: "o"

  china_economy:
    keywords:
      - "china gdp"
      - "china growth"
      - "chinese economy"
      - "beijing"
      - "yuan"
      - "renminbi"
      - "shanghai"
      - "hang seng"
      - "csi 300"
      - "property"
      - "evergrande"
    color: "#e67e22"
    marker: "P"

# VNIndex settings
market:
  symbol: "VNINDEX"
  days_lookback: 90
  timezone: "Asia/Ho_Chi_Minh"

# Chart settings
chart:
  figsize: [20, 12]
  style: "whitegrid"
  dpi: 150
  title: "VNIndex Timeline với Sự kiện Tin tức Toàn cầu"
  output_dir: "output"
  output_filename: "vnindex_news_timeline.png"

  # Annotation settings
  max_annotations: 25
  annotation_fontsize: 7
  price_line_color: "#2c3e50"
  price_line_width: 2.5
